<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BashLab Sandbox Console</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .panel { background: #1e1e1e; border: 1px solid #333; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { color: #4fc3f7; text-align: center; }
        h3 { margin-top: 0; color: #81d4fa; }
        .form-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; background: #2d2d2d; border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; outline: none; }
        input:focus { border-color: #4fc3f7; }
        button { background: #0288d1; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #039be5; }
        #terminal { background: #000; border: 2px solid #333; color: #00ff00; height: 400px; overflow-y: auto; padding: 15px; font-family: 'Courier New', Courier, monospace; white-space: pre-wrap; border-radius: 4px; font-size: 14px; line-height: 1.4; }
        .status-bar { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 5px; }
        .log-entry { margin-bottom: 2px; }
        .error { color: #ff5252; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BashLab Sandbox</h1>

        <div class="panel">
            <h3>Start New Session</h3>
            <div class="form-group">
                <input type="text" id="cmdInput" placeholder="Initial command (e.g., ls -la)" value="ls -la">
                <button onclick="createContainer()">Launch Container</button>
            </div>
        </div>

        <div class="status-bar">
            <span id="connectionStatus">Status: Disconnected</span>
            <span id="activeCid">ID: None</span>
        </div>
        <div id="terminal">Welcome to BashLab Sandbox. Create a container to start.</div>
        
        <div style="margin-top: 10px;">
            <input type="text" id="stdinInput" placeholder="Type command and press Enter..." style="width: 100%; padding: 12px; box-sizing: border-box;" disabled>
        </div>
    </div>

    <script>
        let ws = null;
        let currentCid = null;

        function appendToTerminal(text, isError = false) {
            const term = document.getElementById('terminal');
            const span = document.createElement('span');
            span.className = isError ? 'error' : 'log-entry';
            span.textContent = text;
            term.appendChild(span);
            term.scrollTop = term.scrollHeight;
        }

        async function createContainer() {
            const command = document.getElementById('cmdInput').value;
            appendToTerminal(`\n> Creating container with command: ${command}...\n`);
            
            try {
                const response = await fetch('/api/containers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: command, run_as_user: true })
                });

                if (!response.ok) throw new Error(await response.text());

                const data = await response.json();
                currentCid = data.container_id;
                document.getElementById('activeCid').textContent = `ID: ${currentCid}`;
                appendToTerminal(`> Container created: ${currentCid}. Connecting...\n`);
                
                connectWebSocket(currentCid);
            } catch (err) {
                appendToTerminal(`\nError: ${err.message}\n`, true);
            }
        }

        function connectWebSocket(cid) {
            if (ws) ws.close();

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/containers/${cid}/exec`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                document.getElementById('connectionStatus').textContent = 'Status: Connected';
                document.getElementById('connectionStatus').style.color = '#4caf50';
                document.getElementById('stdinInput').disabled = false;
                document.getElementById('stdinInput').focus();
                appendToTerminal(`> WebSocket connected. Interaction enabled.\n`);
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'stdout') {
                        appendToTerminal(msg.data);
                    } else if (msg.type === 'exit') {
                        appendToTerminal(`\n> Process exited with code: ${msg.code}\n`);
                        disconnect();
                    }
                } catch (e) {
                    console.error("Failed to parse message", event.data);
                }
            };

            ws.onclose = () => {
                disconnect();
                appendToTerminal(`\n> Connection closed.\n`);
            };

            ws.onerror = (err) => {
                appendToTerminal(`\n> WebSocket Error occurred.\n`, true);
            };
        }

        function disconnect() {
            document.getElementById('connectionStatus').textContent = 'Status: Disconnected';
            document.getElementById('connectionStatus').style.color = '#888';
            document.getElementById('stdinInput').disabled = true;
            ws = null;
        }

        document.getElementById('stdinInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && ws && ws.readyState === WebSocket.OPEN) {
                const cmd = e.target.value;
                ws.send(cmd + '\n');
                e.target.value = '';
            }
        });
    </script>
</body>
</html>
