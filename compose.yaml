services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - '${SERVER_PORT:-8080}:8080'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: 'mysql:8.4'
    environment:
      - 'MYSQL_DATABASE=${DB_NAME:-mini_messenger}'
      - 'MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-root_password}'
    ports:
      - '${DB_PORT:-3306}:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: 'redis:7.4-alpine'
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ];
      then exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else exec redis-server --appendonly yes;
      fi'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: >
        sh -c 'if [ -n "$$REDIS_PASSWORD" ];
        then redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG;
        else redis-cli ping | grep PONG;
        fi'
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  redis-data:
