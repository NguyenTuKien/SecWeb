apiVersion: v1
kind: Namespace
metadata:
  name: bashlab

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox
  namespace: bashlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox
  template:
    metadata:
      labels:
        app: sandbox
    spec:
      containers:
      - name: sandbox
        image: ghcr.io/nguyentukien/bashlab:latest-sandbox
        securityContext:
          privileged: true # Cần thiết cho sandbox engine
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: cgroup
          mountPath: /sys/fs/cgroup
          readOnly: true
      volumes:
      - name: cgroup
        hostPath:
          path: /sys/fs/cgroup

---
apiVersion: v1
kind: Service
metadata:
  name: sandbox
  namespace: bashlab
spec:
  selector:
    app: sandbox
  ports:
  - port: 8000
    targetPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: bashlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/nguyentukien/bashlab:latest-frontend
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: bashlab
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
