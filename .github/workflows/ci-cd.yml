name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false


      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Create and export .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          echo "$ENV_FILE" > .env
          while IFS= read -r line || [ -n "$line" ]; do
            if [[ "$line" =~ ^[A-Z0-9_]+= ]]; then
              key=$(echo "$line" | cut -d'=' -f1)
              val=$(echo "$line" | cut -d'=' -f2-)
              echo "$key<<EOF" >> $GITHUB_ENV
              echo "$val" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
            fi
          done < .env

      - name: Run Unit Tests
        run: ./mvnw clean test

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run SonarQube Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=NguyenTuKien_ATBM \
            -Dsonar.organization=nguyentukien \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.coverage.exclusions=**/*

  build-image:
    needs: unit-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}
      image_name: ${{ steps.image_name.outputs.name }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Lowercase Repository Name
        id: image_name
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Determine Image Tag
        id: image_tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "tag=${VERSION#v}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.image_name.outputs.name }}:${{ steps.image_tag.outputs.tag }} \
            -t ${{ steps.image_name.outputs.name }}:ci \
            .

      - name: Save Docker image
        run: docker save ${{ steps.image_name.outputs.name }}:ci -o image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: image.tar
          retention-days: 1

  integration-test:
    needs: build-image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Create .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: echo "$ENV_FILE" > .env

      - name: Start services with tested image
        run: |
          IMAGE=${{ needs.build-image.outputs.image_name }}:ci docker compose up -d

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend to start..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS"
            
            # Print logs every 10 attempts to keep output clean but helpful
            if [ $((i % 10)) -eq 0 ]; then
              echo "--- Backend Logs (Attempt $i) ---"
              docker compose logs backend --tail 50 || true
            fi
            
            sleep 10
          done

          echo "Backend failed to start"
          docker compose ps
          docker compose logs
          exit 1

      - name: Verify health response
        run: |
          RESPONSE=$(curl -s http://localhost:8080/actuator/health)
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"UP"'

      - name: Tear down
        if: always()
        run: docker compose down --volumes

  scan-and-push:
    needs: [build-image, integration-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Security Scan
        uses: aquasecurity/trivy-action@18f28d7ec6e8550186fc18e22770529d27528a24 # Pinned stable v0.28.0 (Audited Safe SHA)
        with:
          image-ref: ${{ needs.build-image.outputs.image_name }}:ci
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0 (Audited Safe SHA)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push tested image
        if: github.event_name != 'pull_request'
        run: |
          docker tag ${{ needs.build-image.outputs.image_name }}:ci \
            ${{ needs.build-image.outputs.image_name }}:${{ needs.build-image.outputs.image_tag }}

          docker tag ${{ needs.build-image.outputs.image_name }}:ci \
            ${{ needs.build-image.outputs.image_name }}:latest

          docker push ${{ needs.build-image.outputs.image_name }}:${{ needs.build-image.outputs.image_tag }}

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker push ${{ needs.build-image.outputs.image_name }}:latest
          fi

  update-image-tag:
    needs: [build-image, scan-and-push]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SecInfra repo
        uses: actions/checkout@v4
        with:
          repository: KienHocK8s/SecInfra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          ref: main

      - name: Update image tag in value-prod.yaml
        run: |
          NEW_TAG="${{ needs.build-image.outputs.image_tag }}"
          FILE="app/backend/value-prod.yaml"
          sed -i "s/^  tag: .*/  tag: \"${NEW_TAG}\"/" "$FILE"
          cat "$FILE" | grep "tag:"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/backend/value-prod.yaml
          git diff --staged --quiet || git commit -m "ci: update backend image tag to ${{ needs.build-image.outputs.image_tag }}"
          git push
