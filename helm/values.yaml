replicaCount: 1

image:
  repository: ghcr.io/your-github-username/mini-messenger
  pullPolicy: IfNotPresent
  tag: "latest" # Overrides the image tag whose default is the chart appVersion.

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: api.mini-messenger.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Application specific configuration
app:
  config:
    appName: "mini-messenger"
    serverPort: "8080"
    dockerComposeEnabled: "false"
    dbHost: "mysql-service" # update this with your actual mysql service or host
    dbPort: "3306"
    dbName: "mini_messenger"
    dbUsername: "root"
    jpaDdlAuto: "update"
    redisHost: "redis-service" # update this with your actual redis service or host
    redisPort: "6379"
    redisTimeout: "3s"
    jwtAccessTtlMinutes: "15"
    jwtRefreshTtlDays: "30"
    googleClientId: "PASTE_GOOGLE_OAUTH_CLIENT_ID_HERE"
    googleAllowedAudiences: "PASTE_WEB_CLIENT_ID_HERE,PASTE_ANDROID_CLIENT_ID_HERE"
    corsAllowedOrigins: "http://localhost:3000,http://localhost:5173"
    adminSeedEnabled: "true"
    adminUsername: "admin"
    adminEmail: "admin@local.dev"
    adminMasterPublicKey: "YWRtaW4tcHVibGljLWtleS1wbGFjZWhvbGRlcg=="
    adminPrivateKeyIv: "YWRtaW4taXY="
    adminPinSalt: "YWRtaW4tc2FsdA=="
    adminKdfParams: '{"algorithm":"PBKDF2","iterations":100000,"keyLength":256,"digest":"SHA-256","bootstrap":true}'

  secret:
    dbPassword: "mini_password"
    redisPassword: ""
    jwtSecret: "CHANGE_ME_MINIMUM_32_BYTES_SECRET"
    googleClientSecret: "PASTE_GOOGLE_OAUTH_CLIENT_SECRET_HERE_IF_NEEDED"
    adminPassword: "admin123456"
    adminEncryptedPrivateKey: "YWRtaW4tZW5jcnlwdGVkLXByaXZhdGUta2V5LWhvbGRlcg=="
