spring.application.name=${APP_NAME:mini-messenger}
spring.docker.compose.enabled=${DOCKER_COMPOSE_ENABLED:false}

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mini_messenger}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:mini_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:3s}
spring.data.redis.repositories.enabled=false

app.jwt.secret=${JWT_SECRET:CHANGE_ME_MINIMUM_32_BYTES_SECRET}
app.jwt.access-token-ttl-minutes=${JWT_ACCESS_TTL_MINUTES:15}
app.jwt.refresh-token-ttl-days=${JWT_REFRESH_TTL_DAYS:30}

app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.google.allowed-audiences=${GOOGLE_ALLOWED_AUDIENCES:}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

app.bootstrap.admin.enabled=${ADMIN_SEED_ENABLED:true}
app.bootstrap.admin.username=${ADMIN_USERNAME:admin}
app.bootstrap.admin.password=${ADMIN_PASSWORD:admin123456}
app.bootstrap.admin.email=${ADMIN_EMAIL:admin@local.dev}
app.bootstrap.admin.master-key.public-key=${ADMIN_MASTER_PUBLIC_KEY:YWRtaW4tcHVibGljLWtleS1wbGFjZWhvbGRlcg==}
app.bootstrap.admin.master-key.encrypted-private-key=${ADMIN_ENCRYPTED_PRIVATE_KEY:YWRtaW4tZW5jcnlwdGVkLXByaXZhdGUta2V5LWhvbGRlcg==}
app.bootstrap.admin.master-key.private-key-iv=${ADMIN_PRIVATE_KEY_IV:YWRtaW4taXY=}
app.bootstrap.admin.master-key.pin-salt=${ADMIN_PIN_SALT:YWRtaW4tc2FsdA==}
app.bootstrap.admin.master-key.kdf-params=${ADMIN_KDF_PARAMS:{"algorithm":"PBKDF2","iterations":100000,"keyLength":256,"digest":"SHA-256","bootstrap":true}}
